version: '3.8'

services:
  economicapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: economicapp
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5050
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - economic-network
    volumes:
      - app-logs:/app/logs

volumes:
  app-logs:

networks:
  economic-network:
    driver: bridge