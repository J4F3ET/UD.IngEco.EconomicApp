# EconomicApp - Tailscale + Nginx Configuration
# Para desplegar detrás de Tailscale con proxy reverso

# Nginx config para EconomicApp
# Ubicación: /etc/nginx/sites-available/economicapp

server {
    listen 5050;
    server_name _;

    client_max_body_size 50M;
    
    # Logs
    access_log /var/log/nginx/economicapp_access.log;
    error_log /var/log/nginx/economicapp_error.log;

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        
        # Headers necesarios para Blazor
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts para Blazor
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        
        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}